<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaseMap — Interactive Body Model</title>
<style>
  :root {
    --bg: #faf8f3;
    --panel: #f5f1ea;
    --panel-light: #ede7df;
    --accent: #d97757;
    --accent-dim: #c45f42;
    --text: #3d3a34;
    --text-dim: #7a7570;
    --border: #e8dfd5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo {
    font-family: Georgia, serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .logo span { color: var(--accent); }
  .tagline {
    font-size: 13px;
    color: var(--text-dim);
  }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
  }

  #canvas-container {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #fefcf8 0%, #faf8f3 100%);
  }
  #canvas-container canvas { display: block; }

  .loading-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(250, 248, 243, 0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 10;
  }
  .loading-overlay.hidden { display: none; }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 14px;
    color: var(--text-dim);
  }

  .hint {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: var(--text-dim);
    background: rgba(245,241,234, 0.9);
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .view-toggle {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    background: var(--panel-light);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }
  .view-toggle button {
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 8px 20px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .view-toggle button.active {
    background: var(--accent-dim);
    color: #fff;
  }

  .gender-toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    background: var(--panel-light);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    z-index: 20;
  }
  .gender-toggle button {
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .gender-toggle button.active {
    background: var(--accent-dim);
    color: #fff;
  }

  .panel {
    background: var(--panel);
    border-left: 1px solid var(--border);
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }
  .panel h2 {
    font-family: Georgia, serif;
    font-size: 20px;
    font-weight: 500;
  }
  .empty-state {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
  }
  .region-tag {
    display: inline-block;
    background: var(--panel-light);
    color: var(--accent);
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.3px;
    width: fit-content;
  }
  .region-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 4px;
  }
  .region-list-item {
    font-size: 12.5px;
    color: var(--text-dim);
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .region-list-item:hover {
    background: var(--panel-light);
    color: var(--text);
  }
  .region-list-item.highlighted {
    color: var(--accent);
    background: var(--panel-light);
  }

  footer {
    padding: 14px 32px;
    text-align: center;
    font-size: 11.5px;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
  }

  @media (max-width: 880px) {
    main { grid-template-columns: 1fr; grid-template-rows: 60vh 1fr; }
    .panel { border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Ease<span>Map</span></div>
    <div class="tagline">Full-body interactive model</div>
  </div>
</header>

<main>
  <div id="canvas-container">
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text">Loading 3D model...</div>
    </div>
    
    <div class="view-toggle">
      <button id="btn-front" class="active">Front</button>
      <button id="btn-back">Back</button>
    </div>
    
    <div class="gender-toggle">
      <button id="btn-male" class="active">Male</button>
      <button id="btn-female">Female</button>
    </div>
    
    <div class="hint" id="hint">Drag to rotate · Scroll to zoom · Click a highlighted region</div>
  </div>

  <div class="panel" id="panel">
    <h2>Selected area</h2>
    <div class="empty-state" id="empty-state">
      Click on any region of the body to select it.
    </div>
    <div id="selected-area" style="display:none;">
      <div class="region-tag" id="region-tag"></div>
    </div>

    <div style="margin-top: 8px;">
      <div style="font-size:12px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">All regions</div>
      <div class="region-list" id="region-list"></div>
    </div>
  </div>
</main>

<footer>
  Real 3D anatomy model · Interactive regions · Stretch guidance coming soon
</footer>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
// ---------- THREE.JS SETUP ----------
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.set(0, 0, 15);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
keyLight.position.set(4, 5, 6);
keyLight.castShadow = true;
scene.add(keyLight);
const rimLight = new THREE.DirectionalLight(0xd97757, 0.4);
rimLight.position.set(-5, 2, -3);
scene.add(rimLight);

// ---------- LOAD GLB MODEL ----------
const loadingOverlay = document.getElementById('loading-overlay');
const loader = new THREE.GLTFLoader();
let bodyGroup = null;
const interactiveMeshes = [];
const regionLabels = {};

loader.load('./model.glb', (gltf) => {
  bodyGroup = new THREE.Group();
  
  gltf.scene.traverse((child) => {
    if (child.isMesh) {
      // Fix normals from export
      child.geometry.deleteAttribute('normal');
      child.geometry.computeVertexNormals();
      
      // Apply material
      child.material = new THREE.MeshStandardMaterial({
        color: 0xd4ccc0,
        roughness: 0.4,
        metalness: 0.0
      });
      child.castShadow = true;
      child.receiveShadow = true;
      bodyGroup.add(child.clone());
    }
  });

  scene.add(bodyGroup);
  bodyGroup.position.y = 0;
  bodyGroup.scale.set(1.2, 1.2, 1.2);

  addPlaceholderRegions();
  loadingOverlay.classList.add('hidden');
  document.getElementById('hint').style.opacity = '1';
  
}, (progress) => {
  const percent = Math.round((progress.loaded / progress.total) * 100);
  document.querySelector('.loading-text').textContent = `Loading... ${percent}%`;
}, (error) => {
  console.error('Error loading model:', error);
  document.querySelector('.loading-text').textContent = 'Error loading model';
});

function addPlaceholderRegions() {
  const regions = [
    { key: 'head', label: 'Head', pos: [0, 1.75, 0], size: 0.35 },
    { key: 'neck', label: 'Neck', pos: [0, 1.35, 0], size: 0.2 },
    { key: 'leftShoulder', label: 'Left Shoulder', pos: [-0.8, 1.0, 0], size: 0.25 },
    { key: 'rightShoulder', label: 'Right Shoulder', pos: [0.8, 1.0, 0], size: 0.25 },
    { key: 'chest', label: 'Chest', pos: [0, 0.7, 0.3], size: 0.4 },
    { key: 'upperBack', label: 'Upper Back', pos: [0, 0.7, -0.3], size: 0.4 },
    { key: 'abdomen', label: 'Abdomen', pos: [0, 0.2, 0.3], size: 0.35 },
    { key: 'lowerBack', label: 'Lower Back', pos: [0, 0.2, -0.3], size: 0.35 },
    { key: 'leftHip', label: 'Left Hip', pos: [-0.25, -0.35, 0], size: 0.22 },
    { key: 'rightHip', label: 'Right Hip', pos: [0.25, -0.35, 0], size: 0.22 },
    { key: 'leftElbow', label: 'Left Elbow', pos: [-0.8, 0.35, 0], size: 0.15 },
    { key: 'rightElbow', label: 'Right Elbow', pos: [0.8, 0.35, 0], size: 0.15 },
    { key: 'leftWrist', label: 'Left Wrist', pos: [-0.8, -0.15, 0], size: 0.12 },
    { key: 'rightWrist', label: 'Right Wrist', pos: [0.8, -0.15, 0], size: 0.12 },
    { key: 'leftKnee', label: 'Left Knee', pos: [-0.25, -1.1, 0], size: 0.18 },
    { key: 'rightKnee', label: 'Right Knee', pos: [0.25, -1.1, 0], size: 0.18 },
    { key: 'leftAnkle', label: 'Left Ankle', pos: [-0.25, -1.75, 0], size: 0.12 },
    { key: 'rightAnkle', label: 'Right Ankle', pos: [0.25, -1.75, 0], size: 0.12 }
  ];

  regions.forEach(region => {
    const geo = new THREE.SphereGeometry(region.size, 16, 16);
    const mat = new THREE.MeshStandardMaterial({
      color: 0xd97757,
      roughness: 0.5,
      emissive: 0xd97757,
      emissiveIntensity: 0.0,
      transparent: true,
      opacity: 0.0,
      depthWrite: false
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(...region.pos);
    mesh.userData = { region: region.key, side: 'both' };
    bodyGroup.add(mesh);
    interactiveMeshes.push(mesh);
    regionLabels[region.key] = region.label;
  });

  populateRegionList();
}

// ---------- CONTROLS ----------
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 5;
controls.maxDistance = 20;
controls.target.set(0, 0, 0);
controls.enablePan = false;

// ---------- RAYCASTING ----------
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredMesh = null;
let activeMesh = null;
let pointerDownPos = null;

function updateMouse(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
}

function getIntersect() {
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(interactiveMeshes);
  return hits.length > 0 ? hits[0].object : null;
}

renderer.domElement.addEventListener('mousemove', (e) => {
  updateMouse(e);
  const hit = getIntersect();
  if (hit !== hoveredMesh) {
    if (hoveredMesh && hoveredMesh !== activeMesh) {
      hoveredMesh.material.emissiveIntensity = 0.0;
      hoveredMesh.material.opacity = 0.0;
    }
    hoveredMesh = hit;
    if (hoveredMesh) {
      hoveredMesh.material.emissiveIntensity = 0.7;
      hoveredMesh.material.opacity = 0.4;
      renderer.domElement.style.cursor = 'pointer';
    } else {
      renderer.domElement.style.cursor = 'default';
    }
  }
});

renderer.domElement.addEventListener('pointerdown', (e) => {
  pointerDownPos = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('pointerup', (e) => {
  if (!pointerDownPos) return;
  const dx = Math.abs(e.clientX - pointerDownPos.x);
  const dy = Math.abs(e.clientY - pointerDownPos.y);
  pointerDownPos = null;
  if (dx > 5 || dy > 5) return;

  updateMouse(e);
  const hit = getIntersect();
  if (hit) selectRegion(hit);
});

function selectRegion(mesh) {
  if (activeMesh) {
    activeMesh.material.emissiveIntensity = 0.0;
    activeMesh.material.opacity = 0.0;
  }
  activeMesh = mesh;
  activeMesh.material.emissiveIntensity = 0.5;
  activeMesh.material.opacity = 0.5;

  const key = mesh.userData.region;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('selected-area').style.display = 'block';
  document.getElementById('region-tag').textContent = regionLabels[key];
  document.getElementById('hint').style.opacity = '0';
  highlightInList(key);
}

function highlightInList(key) {
  document.querySelectorAll('.region-list-item').forEach(el => {
    el.classList.toggle('highlighted', el.dataset.region === key);
  });
}

function populateRegionList() {
  const regionListEl = document.getElementById('region-list');
  const orderedKeys = [
    'head','neck','leftShoulder','rightShoulder','chest','upperBack',
    'leftElbow','rightElbow','leftWrist','rightWrist',
    'abdomen','lowerBack','leftHip','rightHip',
    'leftKnee','rightKnee','leftAnkle','rightAnkle'
  ];
  orderedKeys.forEach(key => {
    if (regionLabels[key]) {
      const el = document.createElement('div');
      el.className = 'region-list-item';
      el.dataset.region = key;
      el.textContent = regionLabels[key];
      el.onclick = () => {
        const mesh = interactiveMeshes.find(m => m.userData.region === key);
        if (mesh) selectRegion(mesh);
      };
      regionListEl.appendChild(el);
    }
  });
}

// ---------- VIEW TOGGLE ----------
let currentView = 'front';

const btnFront = document.getElementById('btn-front');
const btnBack = document.getElementById('btn-back');

function setView(view) {
  currentView = view;
  btnFront.classList.toggle('active', view === 'front');
  btnBack.classList.toggle('active', view === 'back');
  if (bodyGroup) {
    const targetY = view === 'front' ? 0 : Math.PI;
    animateRotationTo(targetY);
  }
}

let rotationAnimating = false;
function animateRotationTo(targetY) {
  if (rotationAnimating || !bodyGroup) return;
  rotationAnimating = true;
  const startY = bodyGroup.rotation.y;
  let diff = targetY - startY;
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  const duration = 500;
  const startTime = performance.now();

  function step() {
    const elapsed = performance.now() - startTime;
    const t = Math.min(elapsed / duration, 1);
    const eased = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;
    bodyGroup.rotation.y = startY + diff * eased;
    if (t < 1) {
      requestAnimationFrame(step);
    } else {
      bodyGroup.rotation.y = startY + diff;
      rotationAnimating = false;
    }
  }
  step();
}

btnFront.addEventListener('click', () => setView('front'));
btnBack.addEventListener('click', () => setView('back'));

// ---------- GENDER TOGGLE (placeholder) ----------
const btnMale = document.getElementById('btn-male');
const btnFemale = document.getElementById('btn-female');

btnMale.addEventListener('click', () => {
  btnMale.classList.add('active');
  btnFemale.classList.remove('active');
  // Currently both load same model — will swap when female model available
});

btnFemale.addEventListener('click', () => {
  btnFemale.classList.add('active');
  btnMale.classList.remove('active');
  // Currently both load same model — will swap when female model available
});

// ---------- ANIMATION LOOP ----------
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>

</body>
</html>
